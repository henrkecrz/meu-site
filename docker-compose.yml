services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
      POSTGRES_DB: nexus_commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_commerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: nexus_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      FRONTEND_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://nexus:nexus_dev_password@postgres:5432/nexus_commerce?sslmode=disable
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
    ports:
      - "8080:8080"

  web:
    build:
      context: ./frontend
    container_name: nexus_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      VITE_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      VITE_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
    ports:
      - "5173:5173"

volumes:
  postgres_data:
